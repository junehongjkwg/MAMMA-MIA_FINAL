<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | MAMMA MIA</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to MAMMA MIA — Vancouver's premier marketing agency." />
  <meta name="robots" content="noindex, follow" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <link rel="stylesheet" href="css/style.css" />

  <style>
    /* ============================================
       MAMMA MIA — 404 Error Page
       ============================================ */
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
      background: var(--color-bg, #f5f5f2);
      position: relative;
      overflow: hidden;
    }

    .error-page::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(42, 59, 255, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(42, 59, 255, 0.03) 0%, transparent 50%);
      pointer-events: none;
    }

    .error-content {
      position: relative;
      z-index: 1;
      max-width: 640px;
    }

    .error-eyebrow {
      display: inline-block;
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--color-accent, #2a3bff);
      margin-bottom: 24px;
      padding: 8px 16px;
      border: 1px solid var(--color-accent, #2a3bff);
      border-radius: 100px;
    }

    .error-code {
      font-family: 'Bebas Neue', 'Arial Narrow', sans-serif;
      font-size: clamp(140px, 22vw, 320px);
      line-height: 0.85;
      letter-spacing: -0.02em;
      color: var(--color-black, #0a0a0a);
      margin-bottom: 24px;
      position: relative;
    }

    .error-code .accent {
      color: var(--color-accent, #2a3bff);
      font-style: italic;
    }

    .error-title {
      font-family: 'Bebas Neue', 'Arial Narrow', sans-serif;
      font-size: clamp(32px, 5vw, 56px);
      line-height: 1;
      letter-spacing: 0.02em;
      color: var(--color-black, #0a0a0a);
      margin-bottom: 20px;
    }

    .error-message {
      font-family: 'Inter', sans-serif;
      font-size: clamp(16px, 1.5vw, 18px);
      font-weight: 400;
      line-height: 1.6;
      color: var(--color-gray-600, #555550);
      margin-bottom: 48px;
      max-width: 480px;
      margin-left: auto;
      margin-right: auto;
    }

    .error-actions {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .error-btn {
      display: inline-block;
      padding: 18px 40px;
      font-family: 'Bebas Neue', 'Arial Narrow', sans-serif;
      font-size: 15px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-decoration: none;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1px solid transparent;
    }

    .error-btn--primary {
      background: var(--color-black, #0a0a0a);
      color: #fff;
      border-color: var(--color-black, #0a0a0a);
    }

    .error-btn--primary:hover {
      background: var(--color-accent, #2a3bff);
      border-color: var(--color-accent, #2a3bff);
      transform: translateY(-2px);
    }

    .error-btn--secondary {
      background: transparent;
      color: var(--color-black, #0a0a0a);
      border-color: var(--color-black, #0a0a0a);
    }

    .error-btn--secondary:hover {
      background: var(--color-black, #0a0a0a);
      color: #fff;
      transform: translateY(-2px);
    }

    .error-links {
      margin-top: 64px;
      padding-top: 40px;
      border-top: 1px solid var(--color-gray-200, #e2e2de);
    }

    .error-links__label {
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--color-gray-400, #9a9a96);
      margin-bottom: 20px;
    }

    .error-links__list {
      display: flex;
      gap: 32px;
      justify-content: center;
      flex-wrap: wrap;
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .error-links__list a {
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: var(--color-black, #0a0a0a);
      text-decoration: none;
      position: relative;
      transition: color 0.2s ease;
    }

    .error-links__list a::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -4px;
      width: 100%;
      height: 1px;
      background: var(--color-accent, #2a3bff);
      transform: scaleX(0);
      transform-origin: right;
      transition: transform 0.3s ease;
    }

    .error-links__list a:hover {
      color: var(--color-accent, #2a3bff);
    }

    .error-links__list a:hover::after {
      transform: scaleX(1);
      transform-origin: left;
    }

    @media (max-width: 640px) {
      .error-page { padding: 60px 20px; }
      .error-links__list { gap: 20px; }
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-content">
      <span class="error-eyebrow">Error 404</span>
      <h1 class="error-code">4<span class="accent">0</span>4</h1>
      <h2 class="error-title">Page Not Found</h2>
      <p class="error-message">
        The page you're looking for doesn't exist or has been moved.
        Don't worry — let's get you back on track.
      </p>
      <div class="error-actions">
        <a href="/" class="error-btn error-btn--primary">← Back to Home</a>
        <a href="/contact.html" class="error-btn error-btn--secondary">Contact Us</a>
      </div>

      <div class="error-links">
        <div class="error-links__label">Or explore</div>
        <ul class="error-links__list">
          <li><a href="/portfolio.html">Portfolio</a></li>
          <li><a href="/price-plan.html">Price Plan</a></li>
          <li><a href="/contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </main>
</body>
</html>
